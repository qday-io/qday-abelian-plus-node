# Dev L1 via Docker (no local reth/lighthouse binaries).
#
#   Tier 1 — dev EL-only:
#     bash docker-up.sh --profile dev up -d
#     bash scripts/healthcheck.sh --el-only --tx
#
#   Tier 2 — dev full PoS:
#     bash docker-setup-genesis.sh
#     bash docker-up.sh --profile full up -d
#     bash scripts/healthcheck.sh
#
# Mainnet-equivalent: see examples/docker-compose-main.yml
#
# Stop: docker compose --profile <dev|full> down
#
# Image tags and FEE_RECIPIENT come from vars.env (exported by docker-up.sh).

x-reth-healthcheck: &reth-healthcheck
  test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8545'"]
  interval: 5s
  timeout: 3s
  retries: 12
  start_period: 20s

x-beacon-healthcheck: &beacon-healthcheck
  test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/5052'"]
  interval: 5s
  timeout: 3s
  retries: 15
  start_period: 30s

x-reth-dev-cmd: &reth-dev-cmd
  - node
  - --dev
  - --dev.block-time
  - ${DEV_BLOCK_TIME:-2s}
  - --chain
  - /genesis.json
  - --http
  - --http.addr=0.0.0.0
  - --http.port=8545
  - --http.api=eth,net,web3,txpool,debug,trace
  - --http.corsdomain=*
  - --ws
  - --ws.addr=0.0.0.0
  - --ws.port=8546

x-reth-pos-cmd: &reth-pos-cmd
  - node
  - --chain=/genesis.json
  - --http
  - --http.addr=0.0.0.0
  - --http.port=8545
  - --http.api=eth,net,web3,txpool,debug,trace
  - --http.corsdomain=*
  - --ws
  - --ws.addr=0.0.0.0
  - --ws.port=8546
  - --authrpc.addr=0.0.0.0
  - --authrpc.port=8551
  - --authrpc.jwtsecret=/jwt.hex
  - --disable-discovery

services:
  # ---------- Tier 1: dev EL-only ----------
  reth-dev:
    profiles: ["dev"]
    image: ${RETH_IMAGE}
    command: *reth-dev-cmd
    volumes:
      - ./genesis.json:/genesis.json:ro
      - ./reth-dev-data:/root/.local/share/reth
    ports:
      - "${RETH_HTTP_PORT:-8545}:8545"
      - "${RETH_WS_PORT:-8546}:8546"
    healthcheck: *reth-healthcheck

  # ---------- Tier 2: dev full PoS ----------
  reth:
    profiles: ["full"]
    image: ${RETH_IMAGE}
    command: *reth-pos-cmd
    volumes:
      - ./genesis.json:/genesis.json:ro
      - ./jwt.hex:/jwt.hex:ro
      - ./reth-data:/root/.local/share/reth
    ports:
      - "${RETH_HTTP_PORT:-8545}:8545"
      - "${RETH_WS_PORT:-8546}:8546"
      - "${AUTHRPC_PORT:-8551}:8551"
    healthcheck: *reth-healthcheck

  beacon:
    profiles: ["full"]
    image: ${LIGHTHOUSE_IMAGE}
    depends_on:
      reth:
        condition: service_healthy
    command:
      - lighthouse
      - beacon_node
      - --testnet-dir=/testnet
      - --execution-endpoint=http://reth:8551
      - --execution-jwt=/jwt.hex
      - --http
      - --http-address=0.0.0.0
      - --http-port=5052
      - --target-peers=0
      - --disable-packet-filter
      - --allow-insecure-genesis-sync
    volumes:
      - ./testnet:/testnet:ro
      - ./jwt.hex:/jwt.hex:ro
      - ./beacon-data:/root/.lighthouse
    ports:
      - "${BN_HTTP_PORT:-5052}:5052"
    healthcheck: *beacon-healthcheck

  validator:
    profiles: ["full"]
    image: ${LIGHTHOUSE_IMAGE}
    depends_on:
      beacon:
        condition: service_healthy
    command:
      - lighthouse
      - validator_client
      - --testnet-dir=/testnet
      - --validators-dir=/validators
      - --secrets-dir=/secrets
      - --beacon-nodes=http://beacon:5052
      - --suggested-fee-recipient=${FEE_RECIPIENT}
      - --init-slashing-protection
    volumes:
      - ./testnet:/testnet:ro
      - ./node_1/validators:/validators:ro
      - ./node_1/secrets:/secrets:ro

